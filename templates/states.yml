# naija-job-ops — Canonical Application States
# Source of truth for naija-job-ops (writer) and dashboard (reader).
# Both systems MUST use these exact state labels.
#
# Rule: The Status field in data/applications.md must contain EXACTLY
# one of these values (case-sensitive). No markdown bold (**),
# no dates, no extra text. Dates go in the Date Found column.
# Notes go in the Notes column.

states:
  - id: evaluated
    label: Evaluated
    aliases: [evaluated]
    description: Report completed, pending decision on whether to apply
    dashboard_group: evaluated

  - id: applied
    label: Applied
    aliases: [sent, submitted]
    description: Application submitted by the candidate
    dashboard_group: applied

  - id: responded
    label: Responded
    aliases: [contacted]
    description: Company has responded (not yet an interview stage)
    dashboard_group: responded

  - id: interview
    label: Interview
    aliases: [interviewing]
    description: Active interview process underway
    dashboard_group: interview

  - id: offer
    label: Offer
    aliases: [offer received]
    description: Offer received from the company
    dashboard_group: offer

  - id: rejected
    label: Rejected
    aliases: [declined by company]
    description: Rejected by the company
    dashboard_group: rejected

  - id: discarded
    label: Discarded
    aliases: [cancelled, closed, withdrawn]
    description: Discarded by the candidate or listing is closed
    dashboard_group: discarded

  - id: skip
    label: SKIP
    aliases: [skip, not applying, monitor]
    description: Does not fit — decided not to apply
    dashboard_group: skip
