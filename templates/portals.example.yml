# naija-job-ops — Portal Scanner Configuration
# Used by /naija-jobs scan to discover new job listings automatically.
#
# HOW TO USE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add or remove companies in tracked_companies
#   4. Adjust search_queries for your target boards and roles
#   5. Set enabled: false on companies you do not care about
#
# STRATEGY:
#   Level 1: Playwright → careers_url of tracked companies (real-time, reliable)
#   Level 2: WebSearch queries → broad discovery across Nigerian job boards
#   Level 3: Direct Nigerian job board navigation (Jobberman, MyJobMag, etc.)

# ── Title filter ──────────────────────────────────────────────────────────────
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive keyword must match AND 0 negative keywords can match.
# All comparisons are case-insensitive.

title_filter:
  positive:
    # [CUSTOMISE] Add keywords matching YOUR target roles
    # ── Tech roles ──
    - "Software Engineer"
    - "Software Developer"
    - "Backend Developer"
    - "Frontend Developer"
    - "Fullstack Developer"
    - "Mobile Developer"
    - "Android Developer"
    - "iOS Developer"
    - "Data Analyst"
    - "Data Engineer"
    - "Business Analyst"
    - "Product Manager"
    - "Product Designer"
    - "UX Designer"
    - "DevOps"
    - "Cloud Engineer"
    - "Cybersecurity"
    - "IT Support"
    - "Systems Administrator"
    # ── Finance and banking ──
    - "Financial Analyst"
    - "Credit Analyst"
    - "Risk Analyst"
    - "Audit"
    - "Accountant"
    - "Treasury"
    - "Investment"
    - "Compliance Officer"
    # ── Graduate and trainee ──
    - "Graduate Trainee"
    - "Management Trainee"
    - "NYSC"
    - "Corps Member"
    - "Industrial Training"
    - "IT Student"
    - "Intern"
    - "Entry Level"
    - "Fresh Graduate"
    - "Junior"
    # ── General professional ──
    - "Business Development"
    - "Marketing Executive"
    - "HR Officer"
    - "Supply Chain"
    - "Procurement"
    - "Project Officer"
    - "Programme Officer"
  negative:
    # [CUSTOMISE] Add keywords for roles you want to exclude
    - "Senior Manager"
    - "Director"
    - "Head of"
    - "VP "
    - "Vice President"
    - "C-Level"
    - "10+ years"
    - "15 years"
    - "20 years"
  seniority_boost:
    # These terms add relevance priority but are not required filters
    - "Junior"
    - "Entry Level"
    - "Graduate"
    - "Trainee"
    - "Associate"

# ── Search queries ─────────────────────────────────────────────────────────────
# Each query triggers a WebSearch. Results may be stale (Google caches for days).
# Level 2 results are liveness-verified with Playwright before adding to pipeline.

search_queries:
  - query: "Graduate Trainee 2026 site:jobberman.com"
    enabled: true
  - query: "Management Trainee Nigeria 2026 site:myjobmag.com"
    enabled: true
  - query: "NYSC corps member recruitment Nigeria site:ngcareers.com"
    enabled: true
  - query: "Entry level software engineer Nigeria site:ng.indeed.com"
    enabled: true
  - query: "Junior developer Nigeria Lagos 2026 site:hotnigerianjobs.com"
    enabled: true
  - query: "Graduate Trainee Nigeria 2026 site:linkedin.com/jobs"
    enabled: true
  - query: "Management Trainee banking Nigeria 2026"
    enabled: true
  - query: "Software Engineer entry level Lagos Nigeria 2026"
    enabled: true
  - query: "Data Analyst fresh graduate Nigeria 2026"
    enabled: true
  - query: "Industrial Training IT student Nigeria technology"
    enabled: true
  - query: "Financial Analyst NYSC Nigeria 2026"
    enabled: false
  - query: "HR Officer graduate Nigeria 2026"
    enabled: false

